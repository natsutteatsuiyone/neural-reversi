name: Setup Rust environment
description: Install system dependencies, Rust toolchain, cache, and neural network weights

inputs:
  cache-key:
    description: Extra cache key for Swatinem/rust-cache
    default: ''

runs:
  using: composite
  steps:
  - name: Install system dependencies
    shell: bash
    run: |
      sudo apt-get update
      sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

  - name: Install Rust
    uses: dtolnay/rust-toolchain@stable

  - name: Cache Rust dependencies
    uses: Swatinem/rust-cache@v2
    with:
      key: ${{ inputs.cache-key }}

  - name: Download weights
    shell: bash
    run: |
      API_URL="https://api.github.com/repos/natsutteatsuiyone/neural-reversi-weights/releases/latest"
      ASSETS=$(curl -s $API_URL | jq -r '.assets[].browser_download_url')

      # Filter matching eval*.zst
      for url in $ASSETS; do
        fname=$(basename "$url")
        if [[ "$fname" == eval-*.zst || "$fname" == eval_sm-*.zst || "$fname" == eval_wasm-*.zst ]]; then
          echo "Downloading $fname"
          curl -L -o "$fname" "$url"
        fi
      done

      ls -l eval*.zst
