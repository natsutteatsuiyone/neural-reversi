name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust environment
      uses: ./.github/actions/setup-rust

    - name: Run tests
      run: cargo test --all

  rust-test-x86-simd:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust environment
      uses: ./.github/actions/setup-rust
      with:
        cache-key: simd

    - name: Test with AVX2 tier (x86-64-v3)
      env:
        RUSTFLAGS: -C target-cpu=x86-64-v3
      run: cargo test -p reversi-core

    # Explicit --target keeps RUSTFLAGS off build scripts, which run on the
    # runner and would SIGILL if compiled with AVX-512 instructions.
    - name: Compile-check AVX-512 tier (icelake-server, not executed)
      env:
        RUSTFLAGS: -C target-cpu=icelake-server
      run: cargo check -p reversi-core --all-targets --target x86_64-unknown-linux-gnu

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust environment
      uses: ./.github/actions/setup-rust

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Clippy
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  gui-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: crates/gui

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Run tests
      run: bun run test
