env_scripts = [
'''
#!@duckscript
text = readfile Cargo.toml
pos = indexof ${text} "version = \""
len = strlen "version = \""
start = calc ${pos} + ${len}
rest = substring ${text} ${start}
end_pos = indexof ${rest} "\""
version = substring ${rest} 0 ${end_pos}
set_env VERSION ${version}
'''
]

[config]
default_to_workspace = false

# ───────────────────────────────────────────────────────────────
#  Development Tasks
# ───────────────────────────────────────────────────────────────

[tasks.check]
command = "cargo"
args = ["check", "--workspace"]

[tasks.test]
command = "cargo"
args = ["test", "--workspace"]

[tasks.clippy]
clear = true
command = "cargo"
args = [
    "clippy",
    "--workspace",
    "--all-targets",
    "--all-features",
    "--",
    "-D",
    "warnings",
]

[tasks.fmt]
command = "cargo"
args = ["fmt"]

[tasks.fmt-check]
command = "cargo"
args = ["fmt", "--check"]

[tasks.lint]
description = "Run fmt check and clippy"
run_task = { name = ["fmt-check", "clippy"] }

[tasks.bench]
command = "cargo"
args = ["bench", "-p", "reversi-core"]

[tasks.licenses-cli]
description = "Regenerate crates/cli/THIRD_PARTY_LICENSES.txt via cargo-about"
command = "cargo"
args = [
    "about",
    "generate",
    "-m",
    "crates/cli/Cargo.toml",
    "-c",
    "about.toml",
    "about.hbs",
    "-o",
    "crates/cli/THIRD_PARTY_LICENSES.txt",
]

[tasks.licenses-gui]
description = "Regenerate crates/gui/src-tauri/THIRD_PARTY_LICENSES.txt (Rust + JS bundle)"
script_runner = "@duckscript"
script = [
    "exec --fail-on-error cargo about generate -m crates/gui/src-tauri/Cargo.toml -c about.toml about.hbs -o crates/gui/src-tauri/THIRD_PARTY_LICENSES.txt",
    # Run bunx from crates/gui so Bun resolves the locked generate-license-file devDep
    # from node_modules instead of pulling a fresh copy into a global cache.
    "root = pwd",
    "cd crates/gui",
    "exec --fail-on-error bunx generate-license-file --input package.json --output src-tauri/_frontend_licenses.tmp --overwrite --ci",
    "cd ${root}",
    "rust_text = readfile crates/gui/src-tauri/THIRD_PARTY_LICENSES.txt",
    "js_text = readfile crates/gui/src-tauri/_frontend_licenses.tmp",
    "separator = set \"\\n\\n================================================================\\nJavaScript / Node.js packages (frontend bundle)\\n================================================================\\n\\n\"",
    "combined = concat ${rust_text} ${separator} ${js_text}",
    "writefile crates/gui/src-tauri/THIRD_PARTY_LICENSES.txt ${combined}",
    "rm crates/gui/src-tauri/_frontend_licenses.tmp",
]

[tasks.licenses]
description = "Regenerate CLI and GUI THIRD_PARTY_LICENSES.txt bundles"
run_task = { name = ["licenses-cli", "licenses-gui"] }

[tasks.clean]
description = "Clean build artifacts and dist directory"
script_runner = "@duckscript"
script = [
    "exec --fail-on-error cargo clean",
    "dist_exists = is_path_exists dist",
    "if ${dist_exists}",
    "    rm -r dist",
    "end",
]

# ───────────────────────────────────────────────────────────────
#  Distribution Preparation
# ───────────────────────────────────────────────────────────────

[tasks.prepare-dist]
description = "Initialize distribution directory"
script_runner = "@duckscript"
script = [
    "dist_exists = is_path_exists dist",
    "if not ${dist_exists}",
    "    mkdir dist",
    "end",
]

# ═══════════════════════════════════════════════════════════════
#  Unified Build Task
# ═══════════════════════════════════════════════════════════════

[tasks.build-tier]
description = "Build binary for specified CPU tier and build type"
script_runner = "@duckscript"
script = [
    "tier = get_env CPU_TIER",
    "rust_tier = get_env RUST_CPU_TIER",
    "target_triple = get_env TARGET_TRIPLE",
    "binary_basename = get_env BINARY_BASENAME",
    "source_file = get_env SOURCE_FILE",
    "dest_ext = get_env DEST_EXT",
    "filename_suffix = get_env FILENAME_SUFFIX",
    "suffix_missing = is_empty ${filename_suffix}",
    "if ${suffix_missing}",
    "    prefix = get_env FILENAME_PREFIX",
    "    prefix_missing = is_empty ${prefix}",
    "    sanitized_tier = concat ${tier} \"\"",
    "    if not ${prefix_missing}",
    "        tier_delimiter = get_env FILENAME_TIER_DELIMITER",
    "        tier_delimiter_missing = is_empty ${tier_delimiter}",
    "        if not ${tier_delimiter_missing}",
    "            sanitized_tier = replace ${tier} \"-\" ${tier_delimiter}",
    "        end",
    "        filename_suffix = concat ${prefix} ${sanitized_tier}",
    "    else",
    "        filename_suffix = concat ${sanitized_tier} \"\"",
    "    end",
    "end",
    "",
    "rustflags = concat \"-C target-cpu=\" ${rust_tier}",
    "set_env RUSTFLAGS ${rustflags}",
    "build_type = get_env BUILD_TYPE",
    "if eq ${build_type} gui",
    "    workspace_root = get_env CARGO_MAKE_CURRENT_TASK_INITIAL_MAKEFILE_DIRECTORY",
    "    gui_dir = join_path ${workspace_root} crates gui",
    "    cd ${gui_dir}",
    "    exec --fail-on-error bun run tauri build --target ${target_triple}",
    "    cd ${workspace_root}",
    "else",
    "    exec --fail-on-error cargo build --release -p cli --target ${target_triple}",
    "end",
    "unset_env RUSTFLAGS",
    "",
    "version = get_env VERSION",
    "workspace_root = get_env CARGO_MAKE_CURRENT_TASK_INITIAL_MAKEFILE_DIRECTORY",
    "source_subpath = get_env SOURCE_SUBPATH",
    "subpath_missing = is_empty ${source_subpath}",
    "if ${subpath_missing}",
    "    source = join_path ${workspace_root} target ${target_triple} release ${source_file}",
    "else",
    "    source = join_path ${workspace_root} target ${target_triple} release ${source_subpath}",
    "end",
    "dest_name = concat ${binary_basename} \"-\" ${version} \"-\" ${filename_suffix} ${dest_ext}",
    "dest = join_path ${workspace_root} dist ${dest_name}",
    "cp ${source} ${dest}",
    "echo ✓ Built: ${dest_name}",
]

# ═══════════════════════════════════════════════════════════════
#  CLI Binary Builds
# ═══════════════════════════════════════════════════════════════

